<!DOCTYPE html>
<html>
<head>
    <title>College Achievers</title>
    <style>
        body {
            font-family: Arial;
            background: #f4f4f4;
            text-align: center;
        }

        h1 {
            margin-top: 30px;
        }

        .slider {
            width: 320px;
            margin: 40px auto;
            background: white;
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 0 10px gray;
        }

        .slider img {
            width: 100%;
            height: 260px;
            border-radius: 10px;
        }

        h2 {
            margin: 10px 0 5px;
        }

        p {
            margin: 4px;
            font-size: 14px;
        }
    </style>
</head>
<body>

<h1>Our Achievers</h1>

<div class="slider">
    <img id="photo" src="student1.jpg">
    <h2 id="name"></h2>
    <p id="achievement"></p>
    <p id="year"></p>
    <p id="course"></p>
</div>

<script>
    const achievers = [
        {
            photo: "student1.jpg",
            name: "Nirisha",
            achievement: "State Rank 1",
            year: "2025",
            course: "BCA"
        },
        {
            photo: "student2.jpg",
            name: "kavya",
            achievement: "Gold Medalist",
            year: "2024",
            course: "B.Com"
        },
        
    ];

    let index = 0;

    function showAchiever() {
        document.getElementById("photo").src = achievers[index].photo;
        document.getElementById("name").innerText = achievers[index].name;
        document.getElementById("achievement").innerText = achievers[index].achievement;
        document.getElementById("year").innerText = "Year: " + achievers[index].year;
        document.getElementById("course").innerText = "Course: " + achievers[index].course;

        index = (index + 1) % achievers.length;
    }

    // First display immediately
    showAchiever();

    // Auto swap every 5 seconds
    setInterval(showAchiever, 5000);
</script>

</body>
</html>
